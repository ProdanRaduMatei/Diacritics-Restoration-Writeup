data:
  raw_dir: training
  processed_dir: data/processed
  split_seed: 42

transformer:
  preset: recommended
  vocab_size: 8000
  encoder_layers: 4
  decoder_layers: 4
  hidden_size: 256
  attention_heads: 4
  feed_forward_size: 1024
  dropout: 0.1
  max_positions: 256
  epochs: 20
  learning_rate: 0.0003

inference:
  fallback: dictionary
  require_base_constraint: true
  require_lexicon_constraint: true

