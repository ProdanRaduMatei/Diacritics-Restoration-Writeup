data:
  raw_dir: training
  processed_dir: data/processed
  split_seed: 42
  train_ratio: 0.8
  valid_ratio: 0.1

cleaning:
  min_similarity: 0.98
  max_length_ratio: 1.15
  max_chars: 512

baselines:
  ngram_order: 4
  alpha: 0.1

transformer:
  preset: small
  vocab_size: 4000
  encoder_layers: 3
  decoder_layers: 3
  hidden_size: 192
  attention_heads: 4
  feed_forward_size: 768
  dropout: 0.1
  max_positions: 256
  epochs: 20
  learning_rate: 0.0003

inference:
  fallback: dictionary
  require_base_constraint: true
  require_lexicon_constraint: true

